<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizon & Beyond — eTM Dashboard</title>
<style>
  :root{
    --navy:#0F1C3F;--blue:#1A56DB;--lblue:#CADCFC;
    --white:#ffffff;--text:#f8fafc;--sub:#94a3b8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:linear-gradient(160deg,#0F1C3F 0%,#1a3a6b 60%,#0f2d5a 100%);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    color:var(--white);
  }

  .card{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:20px;
    padding:52px 60px;
    max-width:560px;
    width:90%;
    text-align:center;
    backdrop-filter:blur(12px);
    box-shadow:0 24px 64px rgba(0,0,0,0.35);
  }

  /* Lighthouse SVG */
  .lh-wrap{display:flex;justify-content:center;margin-bottom:22px;}

  .brand-title{
    font-family:'Georgia',serif;
    font-size:32px;font-weight:700;
    color:var(--white);
    letter-spacing:0.12em;
    margin-bottom:4px;
  }
  .brand-sub{
    font-family:'Georgia',serif;
    font-size:16px;font-weight:300;
    color:var(--lblue);
    letter-spacing:0.18em;
    font-style:italic;
    margin-bottom:28px;
  }

  .divider{
    width:60px;height:2px;
    background:linear-gradient(90deg,transparent,var(--blue),transparent);
    margin:0 auto 28px;
  }

  .desc{
    font-size:14px;color:var(--sub);
    line-height:1.7;margin-bottom:36px;
  }
  .desc strong{color:var(--lblue);}

  .btn-open{
    display:inline-flex;align-items:center;gap:10px;
    background:var(--blue);color:#fff;
    padding:14px 36px;border-radius:50px;
    font-size:15px;font-weight:600;
    text-decoration:none;
    border:none;cursor:pointer;
    transition:background .2s,transform .15s,box-shadow .2s;
    box-shadow:0 4px 20px rgba(26,86,219,0.45);
    letter-spacing:0.03em;
  }
  .btn-open:hover{
    background:#1447c0;
    transform:translateY(-2px);
    box-shadow:0 8px 28px rgba(26,86,219,0.55);
  }
  .btn-open svg{width:18px;height:18px;flex-shrink:0;}

  .footer{
    margin-top:32px;
    font-size:11px;color:rgba(148,163,184,0.6);
    letter-spacing:0.04em;
  }

  /* Animated glow rings */
  .glow{
    position:fixed;border-radius:50%;pointer-events:none;z-index:0;
  }
  .glow-1{
    width:600px;height:600px;
    top:-200px;right:-200px;
    background:radial-gradient(circle,rgba(26,86,219,0.15) 0%,transparent 70%);
  }
  .glow-2{
    width:400px;height:400px;
    bottom:-150px;left:-100px;
    background:radial-gradient(circle,rgba(202,220,252,0.08) 0%,transparent 70%);
  }
  .card{position:relative;z-index:1;}
</style>
</head>
<body>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="card">

  <!-- Lighthouse icon -->
  <div class="lh-wrap">
    <svg width="56" height="66" viewBox="0 0 48 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M24 20 L6 4"  stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="2 3" opacity="0.6"/>
      <path d="M24 20 L42 4" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="2 3" opacity="0.6"/>
      <path d="M24 20 L14 2" stroke="#f59e0b" stroke-width="1.4" stroke-dasharray="2 3" opacity="0.7"/>
      <path d="M24 20 L34 2" stroke="#f59e0b" stroke-width="1.4" stroke-dasharray="2 3" opacity="0.7"/>
      <path d="M24 20 L24 0" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="2 3" opacity="0.9"/>
      <circle cx="24" cy="20" r="5" fill="#fde68a" opacity="0.25"/>
      <rect x="19" y="15" width="10" height="8" rx="1" fill="#fde68a" opacity="0.9"/>
      <rect x="20" y="16" width="8"  height="6" rx="0.5" fill="#f59e0b"/>
      <path d="M21 23 L20 46 L28 46 L27 23 Z" fill="#e2e8f0"/>
      <path d="M21 28 L27 28 L27 29.5 L21 29.5Z" fill="#94a3b8" opacity="0.5"/>
      <path d="M20.5 34 L27.5 34 L27.5 35.5 L20.5 35.5Z" fill="#94a3b8" opacity="0.5"/>
      <path d="M20.2 40 L27.8 40 L27.8 41.5 L20.2 41.5Z" fill="#94a3b8" opacity="0.5"/>
      <path d="M22 40 Q24 38 26 40 L26 46 L22 46Z" fill="#0f172a"/>
      <rect x="17" y="46" width="14" height="4" rx="1" fill="#cbd5e1"/>
      <path d="M8 52 Q16 50 24 52 Q32 54 40 52" stroke="#38bdf8" stroke-width="1.5" fill="none" opacity="0.8"/>
      <path d="M4 54 Q14 52 24 54 Q34 56 44 54" stroke="#38bdf8" stroke-width="1"   fill="none" opacity="0.4"/>
    </svg>
  </div>

  <div class="brand-title">HORIZON</div>
  <div class="brand-sub">&amp; Beyond</div>
  <div class="divider"></div>

  <p class="desc">
    <strong>eTM Resource Allocation Dashboard</strong><br>
    S/4 Hana · Transportation Management<br><br>
    Track team capacity across roll-outs, manage weekly dedications,
    monitor overloads and estimate costs — all in one place.
  </p>

  <a class="btn-open" href="etm_resource_dashboard_19.html" target="_blank">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
    </svg>
    Open dashboard
  </a>

  <div class="footer">
    Sanofi · Program Management Office · Horizon &amp; Beyond
  </div>

</div>

</body>
</html>
